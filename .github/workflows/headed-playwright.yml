name: Headed Playwright (noVNC + cloudflared)

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to open in headed Playwright"
        required: true
        type: string

jobs:
  run-headed:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system deps for Xvfb/VNC/noVNC
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb fluxbox x11vnc novnc websockify x11-utils \
            ca-certificates curl

      - name: Install npm deps
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start desktop + tunnel + headed Playwright (keeps session open)
        env:
          DISPLAY: :0
          TARGET_URL: ${{ inputs.url }}
        run: |
          set -euo pipefail

          chmod +x ./scripts/start-desktop.sh
          DISPLAY=:0 ./scripts/start-desktop.sh

          echo "Waiting for noVNC to be reachable on localhost:6080..."
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:6080/vnc.html >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          if ! curl -fsS http://localhost:6080/vnc.html >/dev/null; then
            echo "noVNC did not come up on localhost:6080"
            echo "--- process list (filtered) ---"
            ps aux | egrep 'Xvfb|fluxbox|x11vnc|novnc|websockify' || true
            echo "--- /tmp/fluxbox.log ---"
            cat /tmp/fluxbox.log || true
            echo "--- /tmp/x11vnc.log ---"
            cat /tmp/x11vnc.log || true
            echo "--- /tmp/novnc.log ---"
            cat /tmp/novnc.log || true
            echo "--- listening ports ---"
            ss -ltnp || true
            exit 1
          fi

          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared

          ./cloudflared tunnel --url http://localhost:6080 --no-autoupdate >cloudflared.log 2>&1 &

          for i in $(seq 1 60); do
            URL=$(grep -oE 'https://[-a-z0-9]+\.trycloudflare\.com' cloudflared.log | head -n 1 || true)
            if [ -n "${URL:-}" ]; then
              break
            fi
            sleep 1
          done

          if [ -z "${URL:-}" ]; then
            echo "cloudflared did not output a trycloudflare URL in time"
            echo "--- cloudflared.log ---"
            cat cloudflared.log
            exit 1
          fi

          echo "Open this in a new browser tab to access the desktop:" >> $GITHUB_STEP_SUMMARY
          echo "${URL}/vnc.html?autoconnect=true&resize=remote&path=websockify" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Then you will see the headed Chromium window inside the noVNC desktop." >> $GITHUB_STEP_SUMMARY

          node ./src/run-headed.mjs "${TARGET_URL}"
